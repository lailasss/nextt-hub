<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Nextt Hub</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#050D1A;--s1:#091628;--s2:#0D1F35;--s3:#132644;--s4:#1A3360;
  --bd:rgba(201,169,110,.12);--bd2:rgba(201,169,110,.3);
  --acc:#1B3A6B;--acc2:#C9A96E;--gn:#D4AF37;--rd:#FF6B6B;--gd:#FFB347;
  --tx:#E8EAF6;--mu:#7B82A8;--mu2:#454D6B;
}
body{background:var(--bg);color:var(--tx);font-family:'Segoe UI',sans-serif;font-size:13px;line-height:1.5;overflow:hidden;height:100vh}
#root{height:100vh}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:9px}
/* Layout */
.app{display:flex;height:100vh;overflow:hidden}
.sb{width:66px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:0 0 14px}
.sb-logo{padding:14px 0 12px}
.lmark{width:40px;height:40px;background:linear-gradient(135deg,#1B3A6B,#2A5298);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.div{width:34px;height:1px;background:var(--bd);margin:6px 0}
.sbb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:9px 6px;border-radius:11px;width:52px;color:var(--mu);font-size:9px;font-weight:600;background:none;border:none;cursor:pointer;transition:all .15s;text-transform:uppercase;letter-spacing:.8px;margin-bottom:2px}
.sbb:hover{background:rgba(27,58,107,.2);color:var(--tx)}
.sbb.on{background:rgba(27,58,107,.35);color:var(--acc2)}
.sb-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:7px;padding:0 7px}
.av{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid transparent;transition:all .15s}
.av:hover{border-color:rgba(255,255,255,.2)}
.body{display:flex;flex-direction:column;flex:1;overflow:hidden}
.tb{height:52px;flex-shrink:0;background:var(--s1);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 20px;gap:10px}
.tbtit{font-size:15px;font-weight:800;text-transform:uppercase}
.tbsub{display:flex;align-items:center;gap:3px;margin-left:10px}
.tbtab{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:8px;font-size:12px;font-weight:500;background:none;border:none;color:var(--mu);cursor:pointer;transition:all .15s}
.tbtab:hover{background:rgba(27,58,107,.18);color:var(--tx)}
.tbtab.on{background:rgba(27,58,107,.35);color:var(--acc2)}
.tbr{margin-left:auto;display:flex;align-items:center;gap:8px}
.sbox{background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:6px 12px;display:flex;align-items:center;gap:8px;min-width:185px;transition:border-color .15s}
.sbox:focus-within{border-color:var(--acc2)}
.sbox input{background:none;border:none;outline:none;color:var(--tx);font-size:12.5px;width:100%}
.sbox input::placeholder{color:var(--mu2)}
.ib{background:var(--s3);border:1px solid var(--bd);border-radius:8px;padding:7px;display:flex;cursor:pointer;transition:all .15s;color:var(--mu)}
.ib:hover{border-color:var(--acc2);color:var(--acc2)}
.tbbtn{display:flex;align-items:center;gap:6px;padding:7px 15px;border-radius:9px;font-size:12px;font-weight:700;background:var(--acc);color:#fff;border:none;cursor:pointer;transition:all .15s}
.tbbtn:hover{background:#2A5298}
.content{flex:1;overflow:hidden;display:flex}
.main{flex:1;overflow-y:auto;padding:24px 26px}
.ss{width:232px;flex-shrink:0;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.ss-hd{padding:16px 14px 12px;border-bottom:1px solid var(--bd)}
.ss-nm{font-size:15px;font-weight:800}
.ss-sb{font-size:11px;color:var(--mu);margin-top:2px}
.ss-add{width:100%;margin-top:11px;padding:8px 13px;background:linear-gradient(135deg,#1B3A6B,#2A5298);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:7px;cursor:pointer}
.ss-body{flex:1;overflow-y:auto;padding:6px 0}
.ss-it{display:flex;align-items:center;gap:9px;padding:9px 14px;color:var(--mu);font-size:12.5px;background:none;border:none;width:100%;text-align:left;cursor:pointer;transition:all .15s}
.ss-it:hover{background:rgba(27,58,107,.15);color:var(--tx)}
.ss-it.on{background:rgba(27,58,107,.3);color:var(--acc2)}
.sdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:24px}
.stat{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:18px 20px;transition:all .2s}
.stat:hover{border-color:var(--bd2);transform:translateY(-1px)}
.stat-l{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--mu);margin-bottom:11px}
.stat-v{font-size:32px;font-weight:800;line-height:1}
.stat-v.a{color:var(--acc2)}.stat-v.g{color:var(--gn)}.stat-v.r{color:var(--rd)}.stat-v.o{color:var(--gd)}
/* Kanban */
.kanban{display:flex;gap:13px;overflow-x:auto;flex:1;min-height:0;padding-bottom:10px}
.kcol{width:272px;flex-shrink:0;background:var(--s1);border:1px solid var(--bd);border-radius:12px;display:flex;flex-direction:column;max-height:calc(100vh - 155px)}
.kch{padding:13px 13px 11px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.kcn{font-size:13px;font-weight:700}
.kcc{background:var(--s3);border-radius:20px;padding:2px 8px;font-size:11px;color:var(--mu)}
.kb{padding:7px;flex:1;display:flex;flex-direction:column;gap:7px;overflow-y:auto}
.kcard{background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:12px;cursor:pointer;transition:all .15s}
.kcard:hover{border-color:var(--bd2);box-shadow:0 4px 18px rgba(201,169,110,.1);transform:translateY(-1px)}
.kcard-t{font-size:12.5px;font-weight:500;margin-bottom:5px;line-height:1.4}
.kcard-d{font-size:11px;color:var(--mu);margin-bottom:9px;line-height:1.45}
.kcard-f{display:flex;align-items:center;justify-content:space-between}
.kasn{font-size:10px;color:var(--mu2);background:var(--s3);border-radius:5px;padding:2px 7px}
.kadd{margin:0 7px 7px;background:none;border:1px dashed var(--bd);border-radius:8px;padding:8px;color:var(--mu2);font-size:12px;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:all .15s}
.kadd:hover{border-color:var(--acc2);color:var(--acc2)}
.chip{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:500}
/* Table */
.ta{overflow:auto;flex:1}
.dt{width:100%;border-collapse:separate;border-spacing:0}
.dt th{text-align:left;padding:10px 14px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--mu);border-bottom:1px solid var(--bd);background:var(--s1);position:sticky;top:0}
.dt td{padding:11px 14px;font-size:12.5px;border-bottom:1px solid rgba(201,169,110,.07);vertical-align:middle}
.dt tr:hover td{background:rgba(27,58,107,.07)}
.tag{display:inline-flex;padding:2px 8px;border-radius:5px;font-size:10.5px;font-weight:500;background:var(--s3);color:var(--mu);margin-right:3px}
/* Modal */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal{background:var(--s1);border:1px solid var(--bd2);border-radius:18px;width:100%;max-width:510px;max-height:88vh;overflow-y:auto}
.mhd{padding:22px 26px 17px;border-bottom:1px solid var(--bd);display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.mtit{font-size:18px;font-weight:700}
.mbody{padding:20px 26px}
.mclose{background:var(--s3);border:none;color:var(--mu);padding:7px;border-radius:8px;display:flex;cursor:pointer}
.mclose:hover{color:var(--tx)}
.fr{margin-bottom:14px}
.fl{display:block;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--acc2);margin-bottom:7px}
.fi{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:10px 13px;color:var(--tx);font-size:13px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--acc2)}
.fi::placeholder{color:var(--mu2)}
.fa{display:flex;gap:9px;justify-content:flex-end;margin-top:20px}
.btn-c{background:var(--s3);border:1px solid var(--bd);border-radius:9px;padding:8px 18px;color:var(--mu);font-size:13px;cursor:pointer}
.btn-c:hover{color:var(--tx)}
.btn-p{background:var(--acc);border:none;border-radius:9px;padding:8px 20px;color:#fff;font-size:13px;font-weight:700;cursor:pointer}
.btn-p:hover{background:#2A5298}
.btn-d{background:transparent;border:1px solid var(--rd);border-radius:9px;padding:8px 20px;color:var(--rd);font-size:13px;font-weight:700;cursor:pointer}
.icb{background:none;border:none;color:var(--mu);cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:all .15s}
.icb:hover{color:var(--acc2);background:rgba(27,58,107,.2)}
/* Calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);border:1px solid var(--bd);border-radius:13px;overflow:hidden}
.cal-dh{padding:10px 12px;font-size:10px;font-weight:600;text-transform:uppercase;color:var(--mu2);background:var(--s2);border-bottom:1px solid var(--bd)}
.cal-cell{min-height:90px;padding:7px;border-right:1px solid var(--bd);border-bottom:1px solid var(--bd)}
.cal-cell:nth-child(7n){border-right:none}
.cal-date{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;margin-bottom:4px}
.cal-date.tod{background:var(--acc2);color:var(--s1);font-weight:700}
.cal-date.om{color:var(--mu2)}
.cal-ev{font-size:10px;padding:2px 6px;border-radius:4px;margin-bottom:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500;color:#fff}
/* Mini cal */
.mc{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:16px;margin-bottom:16px}
.mc-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mc-mn{font-size:16px;font-weight:700}
.mc-nav{background:none;border:none;color:var(--mu);padding:5px;border-radius:7px;display:flex;cursor:pointer;transition:all .15s}
.mc-nav:hover{background:var(--s3);color:var(--acc2)}
.mc-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;gap:2px}
.mc-dh{font-size:10px;color:var(--mu2);padding:3px 0;font-weight:600}
.mc-cell{width:30px;height:30px;border-radius:7px;margin:auto;display:flex;align-items:center;justify-content:center;font-size:11.5px;cursor:pointer;transition:all .12s;position:relative}
.mc-cell:hover{background:rgba(27,58,107,.2);color:var(--acc2)}
.mc-cell.tod{background:var(--acc2);color:var(--s1);font-weight:700}
.mc-cell.om{color:var(--mu2)}
.mc-cell.ev::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--gn);position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.ag{display:flex;align-items:center;gap:9px;padding:7px 10px;border-radius:8px;cursor:pointer;transition:background .12s;margin-bottom:2px}
.ag:hover{background:var(--s3)}
/* Progress */
.pb{background:var(--s3);border-radius:99px;height:4px;overflow:hidden}
.pf{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--acc),var(--acc2));transition:width .8s}
.pb2{background:var(--s3);border-radius:99px;height:6px;overflow:hidden;margin-bottom:5px}
.pf2{height:100%;border-radius:99px;transition:width .8s}
/* Cards */
.pjc{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:16px 18px;cursor:pointer;transition:all .15s;margin-bottom:11px}
.pjc:hover{border-color:var(--bd2);transform:translateY(-2px)}
.rc{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:13px;cursor:pointer;transition:all .15s;position:relative}
.rc:hover{border-color:var(--bd2)}
.rc-t{font-size:12.5px;font-weight:500;margin-bottom:5px;line-height:1.4}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
/* Sections */
.sec-hd{display:flex;align-items:center;gap:9px;margin-bottom:13px;padding-bottom:11px;border-bottom:1px solid var(--bd)}
.sec-t{font-size:15px;font-weight:700}
.pl{display:grid;grid-template-columns:1fr 320px;gap:20px}
.n1b{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:18px 22px}
/* Comments */
.cmt{display:flex;gap:9px;margin-bottom:11px}
.cmt-av{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.cmt-b{background:var(--s2);border-radius:9px;padding:9px 13px;flex:1;border:1px solid var(--bd)}
.cmt-m{display:flex;gap:7px;align-items:center;margin-bottom:3px}
.cmt-a{font-size:12px;font-weight:600}
.cmt-ts{font-size:10px;color:var(--mu2)}
.cmt-t{font-size:12.5px;color:var(--mu);line-height:1.5}
.ci{display:flex;gap:8px;margin-top:13px;align-items:flex-end}
.ci textarea{flex:1;background:var(--s2);border:1px solid var(--bd);border-radius:9px;padding:9px 12px;color:var(--tx);font-size:12.5px;outline:none;resize:none;transition:border-color .2s;min-height:42px;font-family:inherit}
.ci textarea:focus{border-color:var(--acc2)}
.ci-btn{background:var(--acc);border:none;border-radius:9px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#fff;cursor:pointer;flex-shrink:0}
/* Login */
.lw{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden}
.lw::before{content:'';position:absolute;top:-200px;left:50%;transform:translateX(-50%);width:800px;height:600px;background:radial-gradient(ellipse at center,rgba(27,58,107,.15) 0%,transparent 65%);pointer-events:none}
.lc{background:var(--s1);border:1px solid var(--bd2);border-radius:22px;padding:46px 42px;width:440px;position:relative;z-index:1}
.lbrand{display:flex;align-items:center;gap:11px;margin-bottom:28px}
.lbi{width:44px;height:44px;background:linear-gradient(135deg,#1B3A6B,#2A5298);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:#fff}
.lbn{font-size:21px;font-weight:800;color:var(--acc2)}
.lh1{font-size:21px;font-weight:700;margin-bottom:5px}
.lsub{font-size:12.5px;color:var(--mu);margin-bottom:28px}
.lerr{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.3);border-radius:9px;padding:9px 13px;font-size:12.5px;color:var(--rd);margin-bottom:14px}
.lok{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3);border-radius:9px;padding:9px 13px;font-size:12.5px;color:var(--gn);margin-bottom:14px}
.lbtn{width:100%;padding:12px;background:var(--acc);border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s}
.lbtn:hover{background:#2A5298;transform:translateY(-1px)}
/* Reports */
.ind-c{background:var(--s2);border:1px solid var(--bd);border-radius:13px;padding:22px}
.ind-l{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--mu);margin-bottom:12px}
.ind-v{font-size:40px;font-weight:800;line-height:1}
/* Hero */
.hero{background:linear-gradient(135deg,rgba(27,58,107,.2),rgba(201,169,110,.05));border:1px solid var(--bd2);border-radius:16px;padding:28px 32px;margin-bottom:24px;position:relative;overflow:hidden}
.hero-l{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--acc2);margin-bottom:7px}
.hero-n{font-size:28px;font-weight:800;margin-bottom:13px}
/* Client spaces */
.cs-card{background:var(--s2);border:1px solid var(--bd);border-radius:16px;overflow:hidden;transition:all .2s}
.cs-card:hover{border-color:var(--bd2)}
/* Grid helpers */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
/* Perm checkboxes */
.perm-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:10px;cursor:pointer;background:var(--s2);border:1px solid var(--bd);transition:all .15s}
.perm-row.on{background:rgba(27,58,107,.2);border-color:var(--acc2)}
.dd{color:var(--mu);font-size:13px;line-height:1.7;padding:13px 15px;background:var(--s2);border-radius:9px;margin-bottom:18px;border:1px solid var(--bd)}
/* Contacts bar */
.ct-bar{display:flex;align-items:center;gap:10px;padding:12px 18px;border-bottom:1px solid var(--bd);background:var(--s1);flex-shrink:0}
.ft-bar{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid var(--bd);background:var(--s1);flex-shrink:0}
.srb{background:var(--s3);border:1px solid var(--bd);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:all .15s}
.srb:hover{border-color:var(--bd2)}
/* Idea feed */
.idea-card{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:16px 18px;margin-bottom:11px;transition:border-color .15s}
.idea-card:hover{border-color:var(--bd2)}
</style>
</head>

function domCal(y,m){
  const f=new Date(y,m,1).getDay(),t=new Date(y,m+1,0).getDate(),r=[];
  for(let i=0;i<f;i++)r.push({d:0,cur:false});
  for(let i=1;i<=t;i++)r.push({d:i,cur:true});
  while(r.length%7)r.push({d:0,cur:false});
  return r;
}

function todayStr(){
  const d=new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');

function nowTime(){
  return new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

function dateStr(){
  const d=new Date();
  return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();
}

// ── KANBAN BOARD ──────────────────────────────────────────────────────────
function KanbanBoard({flow,onCardClick,onAddCard,readOnly,onMoveCard}){
  if(!flow)return null;
  const [dragging,setDragging]=useState(null);
  const [overCol,setOverCol]=useState(null);
  const onDragStart=(c)=>!readOnly&&setDragging(c);
  const onDragOver=(e,col)=>{e.preventDefault();setOverCol(col);};
  const onDrop=(e,col)=>{
    e.preventDefault();
    if(dragging&&dragging.col!==col&&onMoveCard)onMoveCard(dragging.id,col);
    setDragging(null);setOverCol(null);
  };
  return h('div',{className:'kanban'},
    flow.cols.map(col=>{
      const cards=flow.cards.filter(c=>c.col===col);
      const isOver=overCol===col&&dragging&&dragging.col!==col;
      return h('div',{key:col,className:'kcol',
        onDragOver:e=>onDragOver(e,col),
        onDrop:e=>onDrop(e,col),
        onDragLeave:()=>setOverCol(null),
        style:{border:isOver?'2px solid var(--acc2)':'1px solid var(--bd)',transition:'border .15s'}
      },
        h('div',{className:'kch'},
          h('div',{style:{display:'flex',alignItems:'center',gap:7}},
            h('span',{className:'kcn'},col),
            h('span',{className:'kcc'},cards.length)
          ),
          !readOnly&&h('button',{className:'icb',onClick:()=>onAddCard&&onAddCard(col)},h(I,{n:'plus',s:13}))
        ),
        h('div',{className:'kb'},
          cards.map(c=>h('div',{key:c.id,className:'kcard',
            draggable:!readOnly,
            onDragStart:()=>onDragStart(c),
            onDragEnd:()=>{setDragging(null);setOverCol(null);},
            onClick:()=>onCardClick&&onCardClick(c),
            style:{opacity:dragging&&dragging.id===c.id?0.45:1,cursor:readOnly?'pointer':'grab'}
          },
            h('div',{style:{marginBottom:6}},h(Chip,{pri:c.pri})),
            h('div',{className:'kcard-t'},c.title),
            c.desc&&h('div',{className:'kcard-d'},c.desc),
            h('div',{className:'kcard-f'},
              h('span',{className:'kasn'},c.who),
              c.cmts.length>0&&h('span',{style:{fontSize:10,color:'var(--acc2)',display:'flex',alignItems:'center',gap:3}},h(I,{n:'msg',s:9}),c.cmts.length)
            )
          )),
          cards.length===0&&h('div',{style:{padding:'14px 7px',textAlign:'center',color:'var(--mu2)',fontSize:12,borderRadius:8,border:isOver?'2px dashed var(--acc2)':'2px dashed transparent',transition:'border .15s'}},'Sem cards')
        ),
        !readOnly&&h('button',{className:'kadd',onClick:()=>onAddCard&&onAddCard(col)},h(I,{n:'plus',s:11}),'Adicionar card')
      );
    })
  );
}

function ModalEvEdit({modal,setModal,setEvs,appUsers}){
  const ev=modal.ev;
  const [ne,setNe]=useState({title:ev.title,date:ev.date,time:ev.time||'',color:ev.color||'#C9A96E',clientIds:ev.clientIds||[]});
  const clients=(appUsers||[]).filter(u=>u.role==='client');
  const toggleClient=(id)=>setNe(p=>({...p,clientIds:p.clientIds.includes(id)?p.clientIds.filter(x=>x!==id):[...p.clientIds,id]}));
  const save=()=>{
    if(!ne.title.trim()||!ne.date)return;
    setEvs(p=>p.map(e=>e.id===ev.id?{...e,...ne}:e));
    // Update client calendars — remove old, add new
    const allClients=(appUsers||[]).filter(u=>u.role==='client');
    allClients.forEach(c=>{
      const prev=lsGet('events_client_'+c.id,[]);
      const withoutOld=prev.filter(e=>e.id!==ev.id&&!(e.originalId&&e.originalId===ev.id));
      if(ne.clientIds.includes(c.id)){
        lsSet('events_client_'+c.id,[...withoutOld,{...ne,id:ev.id,originalId:ev.id,clientTagged:true}]);
      } else {
        lsSet('events_client_'+c.id,withoutOld);
      }
    });
    setModal(null);
  };
  const del=()=>{
    setEvs(p=>p.filter(e=>e.id!==ev.id));
    // Remove from all client calendars too
    (appUsers||[]).filter(u=>u.role==='client').forEach(c=>{
      const prev=lsGet('events_client_'+c.id,[]);
      lsSet('events_client_'+c.id,prev.filter(e=>e.id!==ev.id&&e.originalId!==ev.id));
    });
    setModal(null);

  return h(Modal,{title:'Editar Evento',onClose:()=>setModal(null),maxWidth:460},

    ),
    h(FormRow,{label:'Cor'},h(ColorPicker,{value:ne.color,onChange:c=>setNe(p=>({...p,color:c}))})),
    clients.length>0&&h(FormRow,{label:'Clientes marcados'},
      h('div',{style:{display:'flex',flexDirection:'column',gap:6,maxHeight:150,overflowY:'auto',padding:'2px 0'}},
        clients.map(c=>{
          const on=ne.clientIds.includes(c.id);
          return h('div',{key:c.id,onClick:()=>toggleClient(c.id),style:{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',borderRadius:9,cursor:'pointer',background:on?'rgba(201,169,110,.12)':'var(--s2)',border:'1px solid '+(on?'var(--acc2)':'var(--bd)'),transition:'all .15s'}},
            h('div',{style:{width:18,height:18,borderRadius:5,background:on?'var(--acc2)':'var(--s3)',border:'1px solid '+(on?'var(--acc2)':'var(--bd2)'),display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}},on&&h(I,{n:'check',s:10,c:'var(--s1)'})),
            h('div',{style:{width:26,height:26,borderRadius:7,background:(c.color||'#4A7FB5')+'33',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:c.color||'#4A7FB5',flexShrink:0}},c.initials||'?'),
            h('div',null,

              h('div',{style:{fontSize:11,color:'var(--mu2)'}},c.email)

function ModalFlow({flowModal,setFlowModal,flows,setFlows,updateFlows,setAf}){
  const isEdit=flowModal&&flowModal.type==='edit';
  const isDel=flowModal&&flowModal.type==='del';
  const existing=isEdit?flowModal.f:null;
  const [nf,setNf]=useState(isEdit?{name:existing.name,color:existing.color,client:existing.client||''}:{name:'',color:'#D4AF37',client:''});

  if(isDel){
    const flow=flows.find(f=>f.id===flowModal.id);
    return h(Modal,{title:'Excluir fluxo?',onClose:()=>setFlowModal(null),maxWidth:400},
      h('div',{style:{marginBottom:16}},
        h('div',{style:{display:'flex',alignItems:'center',gap:8,padding:'12px 14px',background:'var(--s2)',borderRadius:10,border:'1px solid var(--bd)',marginBottom:12}},
          h('div',{style:{width:10,height:10,borderRadius:'50%',background:flow?flow.color:'var(--rd)'}}),
          h('span',{style:{fontWeight:600}},flow?flow.name:'este fluxo')
        ),
        h('div',{style:{color:'var(--mu)',fontSize:12.5,lineHeight:1.6}},'Todos os cards deste fluxo também serão removidos. Esta ação não pode ser desfeita.')
      ),
      h('div',{className:'fa'},
        h(Btn,{onClick:()=>setFlowModal(null),variant:'secondary'},'Cancelar'),
        h(Btn,{onClick:()=>{const rem=flows.filter(f=>f.id!==flowModal.id);setFlows(rem);setAf(rem[0]||null);setFlowModal(null);},variant:'danger'},'Excluir fluxo')
      )
    );
  }

  const save=()=>{
    if(!nf.name.trim())return;
    if(isEdit){
      const fn=updateFlows||setFlows;fn(p=>p.map(f=>f.id===existing.id?{...f,name:nf.name,color:nf.color,client:nf.client}:f));
    } else {
      const novo={id:Date.now(),name:nf.name,color:nf.color,client:nf.client,cols:['A Fazer','Fazendo','Conferir','Finalizado'],cards:[]};
      const fn=updateFlows||setFlows;fn(p=>[...p,novo]);
      setAf(novo);
    }
    setFlowModal(null);
  };

  return h(Modal,{title:isEdit?'Editar fluxo':'Novo fluxo',onClose:()=>setFlowModal(null),maxWidth:460},
    h(FormRow,{label:'Nome do fluxo'},
      h(Input,{placeholder:'ex: Campanha Verão 2026',value:nf.name,onChange:e=>setNf(p=>({...p,name:e.target.value})),onKeyDown:e=>e.key==='Enter'&&save()})
    ),
    h(FormRow,{label:'Cliente / Empresa'},
      h(Input,{placeholder:'ex: Empresa Alpha',value:nf.client,onChange:e=>setNf(p=>({...p,client:e.target.value}))})
    ),
    h(FormRow,{label:'Cor de identificação'},
      h(ColorPicker,{value:nf.color,onChange:c=>setNf(p=>({...p,color:c})),colors:['#D4AF37','#C9A96E','#4A7FB5','#2A5298','#1B3A6B','#D4373A','#00A86B','#8B6EC9','#FF6BDE','#5a9a5a']})
    ),
    h('div',{style:{display:'flex',alignItems:'center',gap:10,padding:'11px 14px',background:'var(--s2)',borderRadius:10,border:'1px solid var(--bd)',marginBottom:6}},
      h('div',{style:{width:10,height:10,borderRadius:'50%',background:nf.color}}),
      h('span',{style:{fontSize:13,fontWeight:600}},nf.name||'Nome do fluxo'),
      nf.client&&h('span',{style:{fontSize:11,color:'var(--mu)',marginLeft:4}},'· '+nf.client)
    ),
    h('div',{className:'fa'},
      h(Btn,{onClick:()=>setFlowModal(null),variant:'secondary'},'Cancelar'),
      h(Btn,{onClick:save},isEdit?'Salvar alterações':'Criar fluxo')
    )
  );
}

function ModalClientEv({modal,setModal,addEv,editEv}){
  const isEdit=modal&&modal.edit;
  const ev=isEdit?modal.ev:null;
  const [ne,setNe]=useState(isEdit?{title:ev.title,date:ev.date,time:ev.time||'',color:ev.color||'#4A7FB5'}:{title:'',date:'',time:'',color:'#4A7FB5'});
  const save=()=>{
    if(!ne.title.trim()||!ne.date)return;
    if(isEdit)editEv(ev.id,ne);
    else addEv({id:Date.now(),...ne,byClient:true});
    setModal(null);
  };
  return h(Modal,{title:isEdit?'Editar Evento':'Novo Evento',onClose:()=>setModal(null),maxWidth:440},
    h(FormRow,{label:'Título'},h(Input,{placeholder:'ex: Reunião, entrega, prazo...',value:ne.title,onChange:e=>setNe(p=>({...p,title:e.target.value}))})),
    h('div',{className:'g2'},
      h(FormRow,{label:'Data'},h(Input,{type:'date',value:ne.date,onChange:e=>setNe(p=>({...p,date:e.target.value}))})),
      h(FormRow,{label:'Horário'},h(Input,{type:'time',value:ne.time,onChange:e=>setNe(p=>({...p,time:e.target.value}))}))
    ),
    h(FormRow,{label:'Cor'},h(ColorPicker,{value:ne.color,onChange:c=>setNe(p=>({...p,color:c}))})),
    h('div',{style:{background:'var(--s3)',borderRadius:9,padding:'10px 13px',marginBottom:14,fontSize:12,color:'var(--mu)'}},'Este evento fica no seu calendário pessoal.'),
    h('div',{className:'fa'},
      isEdit&&h(Btn,{onClick:()=>{if(window.confirm('Excluir este evento?')){editEv&&modal.ev&&setModal(null);}},variant:'danger'},'Excluir'),
      h(Btn,{onClick:()=>setModal(null),variant:'secondary'},'Cancelar'),
      h(Btn,{onClick:save},isEdit?'Salvar':'Adicionar')
    )
  );
}

            h('div',{className:'hero'},h('div',{className:'hero-l'},'Seu Projeto'),h('div',{className:'hero-n'},lf.name),h('div',{style:{display:'flex',alignItems:'center',gap:12,marginBottom:9}},h('span',{style:{fontSize:12,color:'var(--mu)'}},'Progresso'),h('span',{style:{fontSize:17,fontWeight:700,color:'var(--acc2)'}},pct+'%')),h('div',{className:'pb'},h('div',{className:'pf',style:{width:pct+'%'}}))),
            h('div',{className:'stats',style:{gridTemplateColumns:'repeat(3,1fr)'}},h('div',{className:'stat'},h('div',{className:'stat-l'},'Total'),h('div',{className:'stat-v a'},lf.cards.length)),h('div',{className:'stat'},h('div',{className:'stat-l'},'Fazendo'),h('div',{className:'stat-v o'},lf.cards.filter(c=>c.col==='Fazendo').length)),h('div',{className:'stat'},h('div',{className:'stat-l'},'Finalizados'),h('div',{className:'stat-v g'},done))),
            h('div',{className:'cg'},lf.cards.map(c=>h('div',{key:c.id,className:'rc',onClick:()=>setTaskM(c)},h(Chip,{pri:c.pri}),h('div',{className:'rc-t',style:{marginTop:6}},c.title),h('div',{style:{fontSize:10.5,color:'var(--mu2)',marginTop:4}},c.col))))
          ),
          view==='kanban'&&h(KanbanBoard,{flow:lf,onCardClick:setTaskM,readOnly:true}),
          view==='agenda'&&h(Fragment,null,
            h(FullCal,{cal,setCal,evs,today,onAddEvent:()=>setEvModal(true)}),
            evModal&&h(ModalEvParceiro,{setEvModal,onAddEvent:onAddEvent||null,evs})
          ),
          view==='relat'&&h(RelatView,{flows:myFlows}),
          view==='files'&&h('div',{style:{display:'flex',flexDirection:'column',height:'100%',margin:'-24px -26px'}},
            h('div',{className:'ft-bar'},
              h('button',{className:'tbbtn',onClick:()=>setParceiroFileModal(true)},h(I,{n:'plus',s:12}),'Adicionar arquivo'),
              h('div',{style:{flex:1,textAlign:'center'}},h('span',{style:{fontWeight:800,fontSize:16}},'ARQUIVOS DO PROJETO'))
            ),
            cfiles.length===0?h('div',{style:{textAlign:'center',padding:36,color:'var(--mu2)'}},'Nenhum arquivo disponível'):
            h('div',{className:'ta'},h('table',{className:'dt'},
              h('thead',null,h('tr',null,h('th',null,''),h('th',null,'Nome'),h('th',null,'Card'),h('th',null,'Tamanho'),h('th',null,'Marcados'),h('th',null,'Data'))),
              h('tbody',null,cfiles.map(f=>{
                const taggedUsers=f.taggedIds?(lsGet('users',INIT_USERS)).filter(u=>f.taggedIds.includes(u.id)):[];
                return h('tr',{key:f.id},
                  h('td',null,h('div',{style:{width:30,height:30,borderRadius:8,background:'rgba(27,58,107,.2)',display:'flex',alignItems:'center',justifyContent:'center',cursor:f.url||f.fileData?'pointer':'default'},onClick:()=>{if(f.url)window.open(f.url,'_blank');else if(f.fileData){const w=window.open();w.document.write('<img src="'+f.fileData+'" style="max-width:100%">');}}},
                    f.tipo==='imagem'&&f.fileData?h('img',{src:f.fileData,style:{width:'100%',height:'100%',objectFit:'cover',borderRadius:7}}):

function ModalEvParceiro({setEvModal,onAddEvent}){
  const [ne,setNe]=useState({title:'',date:'',time:'',color:'#D4AF37'});
  const save=()=>{
    if(!ne.title.trim()||!ne.date)return;
    if(onAddEvent)onAddEvent({id:Date.now(),...ne});
    setEvModal(false);
  };
  return h(Modal,{title:'Novo Evento',onClose:()=>setEvModal(false),maxWidth:440},
    h(FormRow,{label:'Título'},h(Input,{placeholder:'ex: Reunião com cliente',value:ne.title,onChange:e=>setNe(p=>({...p,title:e.target.value}))})),
    h('div',{className:'g2'},
      h(FormRow,{label:'Data'},h(Input,{type:'date',value:ne.date,onChange:e=>setNe(p=>({...p,date:e.target.value}))})),
      h(FormRow,{label:'Horário'},h(Input,{type:'time',value:ne.time,onChange:e=>setNe(p=>({...p,time:e.target.value}))}))
    ),
    h(FormRow,{label:'Cor'},h(ColorPicker,{value:ne.color,onChange:c=>setNe(p=>({...p,color:c}))})),
    h('div',{style:{background:'var(--s3)',borderRadius:9,padding:'10px 13px',marginBottom:14,fontSize:12,color:'var(--mu)'}},'Este evento será adicionado ao calendário compartilhado com o Administrador.'),
    h('div',{className:'fa'},h(Btn,{onClick:()=>setEvModal(false),variant:'secondary'},'Cancelar'),h(Btn,{onClick:save},'Adicionar ao calendário'))
  );
}

// ── APP ROOT ───────────────────────────────────────────────────────────────
const DFLT_PERMS={
  parceiro:{painel:true,fluxos:true,contatos:false,arquivos:true,search:false,relat:false,metas:false,calendario:true},
  client:{painel:true,fluxos:true,contatos:false,arquivos:true,search:false,relat:false,metas:false,calendario:true},
};
function App(){
  const [u,setU]=useState(()=>lsGet('session',null));
  const [users,setUsers]=useState(()=>{
    const APP_VER='nextt_v3';
    const ver=localStorage.getItem('nextt_app_ver');
    if(ver!==APP_VER){
      // New version - reset users but keep other data
      localStorage.setItem('nextt_app_ver',APP_VER);
      lsSet('users',INIT_USERS);
      // Clear test files if they exist
      const existingFiles=lsGet('files',null);
      if(existingFiles&&existingFiles.some(f=>f.by==='Laila Sena'||f.by==='Carlos Parceiro')){
        lsSet('files',[]);
      }
      return INIT_USERS;
    }
    const saved=lsGet('users',null);
    if(!saved||saved.length===0){
      lsSet('users',INIT_USERS);
      return INIT_USERS;
    }
    // Ensure real admin always exists
    const hasMyAdmin=saved.some(u=>u.email==='nexttadm@gmail.com');
    if(!hasMyAdmin){
      const withAdmin=[{id:1,name:'Administrador',email:'nexttadm@gmail.com',password:'217613',role:'admin',initials:'AD',color:'#C9A96E'},...saved.filter(u=>u.email!=='nexttadm@gmail.com')];
      lsSet('users',withAdmin);
      return withAdmin;
    }
    return saved;
  });
  const [sharedEvs,setSharedEvs]=useState(()=>lsGet('events_shared',INIT_EVENTS));
  const [sharedFlows,setSharedFlows]=useState(()=>lsGet('flows',INIT_FLOWS));
  const [perms,setPerms]=useState(()=>lsGet('perms',DFLT_PERMS));
  const [sharedCts,setSharedCts]=useState(()=>lsGet('contacts',INIT_CONTACTS));
  const [sharedGoals,setSharedGoals]=useState(()=>lsGet('goals',null));
  const [sharedFinancas,setSharedFinancas]=useState(()=>lsGet('financas',null));
  const [sharedClientSpaces,setSharedClientSpaces]=useState(()=>lsGet('clientSpaces',null));
  const saveUsers=(v)=>{
    const nv=typeof v==='function'?v(users):v;
    setUsers(nv);
    lsSet('users',nv);
    // Also update current session user if their data changed
    if(u){const updated=nv.find(x=>x.id===u.id);if(updated){setU(updated);lsSet('session',updated);}}
  };
  const saveEvs=(v)=>{const nv=typeof v==='function'?v(sharedEvs):v;setSharedEvs(nv);lsSet('events_shared',nv);};
  const saveFlows=(v)=>{setSharedFlows(typeof v==='function'?v(sharedFlows):v);lsSet('flows',typeof v==='function'?v(sharedFlows):v);};
  const savePerms=(v)=>{setPerms(v);lsSet('perms',v);};
  const addSharedEvent=(ev)=>{const ne=[...sharedEvs,ev];setSharedEvs(ne);lsSet('events_shared',ne);};
  const login=(usr)=>{setU(usr);lsSet('session',usr);};
  const logout=()=>{setU(null);lsSet('session',null);};
  if(!u)return h(Login,{onLogin:login,users});
  if(u.role==='client')return h(ClientPortal,{user:u,onLogout:logout,perms,flows:sharedFlows});
  if(u.role==='parceiro')return h(ParceiroPortal,{user:u,onLogout:logout,perms,sharedEvs,onAddEvent:addSharedEvent,flows:sharedFlows,getClientEvs:()=>{const ces=[];try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('nextt_events_client_')){const uid=k.replace('nextt_events_client_','');const c=lsGet('events_client_'+uid,[]);ces.push(...c);}}}catch(e){}return ces;}});
  return h(AdminPortal,{user:u,onLogout:logout,sharedEvs,setSharedEvs:saveEvs,sharedFlows,setSharedFlows:saveFlows,perms,setPerms:savePerms,sharedCts,sharedGoals,sharedFinancas,sharedClientSpaces,appUsers:users,setAppUsersExt:saveUsers});
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App,null));
</script>
